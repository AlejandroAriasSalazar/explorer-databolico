<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1"/>
<meta name="theme-color" content="#09090b"/>
<title>Data Colombia · Inteligencia de población</title>
<meta name="description" content="Data Colombia — inteligencia de mercado sobre población sintética enriquecida de Colombia (52 variables, datos oficiales DANE + modelado con bandas)."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;680;700&display=swap"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <div><b>Data Colombia</b><small>Población · Inteligencia</small></div>
    </div>
    <span class="spacer"></span>
    <span id="srcBadge" class="badge demo"><span class="led"></span>DEMO</span>
    <button class="icon-btn" id="openSettings" aria-label="Ajustes">⚙</button>
  </header>

  <div class="filters">
    <div class="chips" id="filterChips">
      <button class="chip" data-filter="territory"><span class="k">Territorio</span> <span id="fTerr">Todo el país</span></button>
      <button class="chip" data-filter="age"><span class="k">Edad</span> <span id="fAge">0–100</span></button>
      <button class="chip" data-filter="sex"><span class="k">Sexo</span> <span id="fSex">Todos</span></button>
      <button class="chip" id="liveChip" data-filter="live">↻ Recargar</button>
    </div>
  </div>

  <main>
    <section class="view" id="view-overview"></section>
    <section class="view hidden" id="view-culture"></section>
    <section class="view hidden" id="view-economy"></section>
    <section class="view hidden" id="view-tech"></section>
    <section class="view hidden" id="view-people"></section>
    <section class="view hidden" id="view-dict"></section>
    <div class="foot" id="foot"></div>
  </main>

  <nav class="nav" id="nav">
    <button data-view="overview" class="active"><span class="ic"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7.5" height="7.5" rx="1.6"/><rect x="13.5" y="3" width="7.5" height="7.5" rx="1.6"/><rect x="3" y="13.5" width="7.5" height="7.5" rx="1.6"/><rect x="13.5" y="13.5" width="7.5" height="7.5" rx="1.6"/></svg></span>Resumen</button>
    <button data-view="culture"><span class="ic"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 17V4l11-2v12"/><circle cx="6" cy="17.5" r="2.8"/><circle cx="17" cy="15.5" r="2.8"/></svg></span>Cultura</button>
    <button data-view="economy"><span class="ic"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="M3 9.5h18M7 15h4"/></svg></span>Economía</button>
    <button data-view="tech"><span class="ic"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="6.5" y="2.5" width="11" height="19" rx="2.6"/><path d="M10.5 18.5h3"/></svg></span>Tech</button>
    <button data-view="people"><span class="ic"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3.6 20a5.4 5.4 0 0 1 10.8 0"/><path d="M16 5.4a3 3 0 0 1 0 5.5M20.4 20a5 5 0 0 0-3-4.6"/></svg></span>Personas</button>
    <button data-view="dict"><span class="ic"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6h11M9 12h11M9 18h11"/><circle cx="4.5" cy="6" r="1.1"/><circle cx="4.5" cy="12" r="1.1"/><circle cx="4.5" cy="18" r="1.1"/></svg></span>Variables</button>
  </nav>
</div>

<div class="toast" id="toast"></div>
<div id="sheetRoot"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="demo-data.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
